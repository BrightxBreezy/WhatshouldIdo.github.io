<!DOCTYPE html>
<html>
<head>
  <title>What Should I Do?</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #d6f3ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 520px;
      height: 80vh;
      background: white;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }

    button {
      padding: 15px 28px;
      font-size: 18px;
      border: none;
      border-radius: 15px;
      background: #ff6fae;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #ff4f97;
      transform: scale(1.05);
    }

    #result {
      margin-top: 35px;
      font-size: 24px;
      font-weight: bold;
      color: #333;
      padding: 0 10px;
      min-height: 60px;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>What Should I Do Right Now?</h1>

  <p>Click here to find out what your next moment becomes ✨</p>

  <button onclick="generate()">Click here to find out</button>

  <div id="result"></div>

</div>

<script>
  const ideas = [
    "Go outside for 5 minutes and just exist",
    "Drink a full glass of water right now",
    "Text someone you haven’t talked to in a while",
    "Do 15 jumping jacks like your life depends on it",
    "Draw the first thing that pops into your head",
    "Watch a completely random video on YouTube",
    "Clean the most annoying spot in your room",
    "Make up a brand new game with weird rules",
    "Stare out a window for 2 minutes",
    "Listen to a song you haven’t heard in months",
    "Try to balance something on your head",
    "Write a fake movie plot in 1 minute",
    "Google something you’ve always been curious about",
    "Organize one small thing like a drawer or folder",
    "Try to do a handstand",
    "Take 10 deep slow breaths",
    "Invent a useless invention",
    "Make a meme in your head",
    "Act like you’re a narrator describing your life",
    "Try to find 3 things that are blue around you",
    "Say something nice to someone in your house",
    "Walk around your room like it’s a runway",
    "Pretend you’re in a video game for 2 minutes",
    "Write a weird question and try to answer it",
    "Make a snack but make it chaotic",
    "Rearrange something just for fun",
    "Write a book",
    "Make some videos"
  ];

  let lastResults = [];

  function generate() {
    let index;

    // prevents repeating same results too often
    do {
      index = Math.floor(Math.random() * ideas.length);
    } while (lastResults.includes(index) && ideas.length > 5);

    lastResults.push(index);

    // keep only last 5 results
    if (lastResults.length > 5) {
      lastResults.shift();
    }

    document.getElementById("result").innerText = ideas[index];
  }
</script>

</body>
</html>
