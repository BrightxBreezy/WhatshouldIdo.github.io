<!DOCTYPE html>
<html>
<head>
  <title>What Should I Do?</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e7, #d6f3ff);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      opacity: 0.4;
      filter: blur(20px);
      animation: float 6s infinite ease-in-out;
    }

    .b1 { background: #ffb3d9; top: 10%; left: 10%; }
    .b2 { background: #b3e5ff; bottom: 10%; right: 10%; animation-delay: 2s; }
    .b3 { background: #ffd1a6; top: 60%; left: 70%; animation-delay: 4s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    .card {
      width: 90%;
      max-width: 540px;
      height: 85vh;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 30px;
      color: #333;
    }

    button {
      padding: 16px 30px;
      font-size: 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff6fae, #ff9ecb);
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button:hover {
      transform: scale(1.08);
    }

    #result {
      margin-top: 40px;
      font-size: 26px;
      font-weight: bold;
      color: #333;
      min-height: 80px;
      padding: 0 15px;
    }
  </style>
</head>

<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card">

  <h1>What Should I Do Right Now?</h1>

  <button onclick="generate()">Click here to find out</button>

  <div id="result"></div>

</div>

<script>
  const ideas = [
    "Go outside for 5 minutes and just exist",
    "Drink a full glass of water right now",
    "Text someone you haven’t talked to in a while",
    "Do 15 jumping jacks like your life depends on it",
    "Draw the first thing that pops into your head",
    "Watch a completely random video on YouTube",
    "Clean the most annoying spot in your room",
    "Make up a brand new game with weird rules",
    "Stare out a window for 2 minutes",
    "Listen to a song you haven’t heard in months",
    "Try to balance something on your head",
    "Write a fake movie plot in 1 minute",
    "Google something you’ve always been curious about",
    "Organize one small thing like a drawer or folder",
    "Try to do a handstand",
    "Take 10 deep slow breaths",
    "Invent a useless invention",
    "Make a meme in your head",
    "Act like you’re a narrator describing your life",
    "Try to find 3 things that are blue around you",
    "Say something nice to someone in your house",
    "Walk around your room like it’s a runway",
    "Pretend you’re in a video game for 2 minutes",
    "Write a weird question and try to answer it",
    "Make a snack but make it chaotic",
    "Rearrange something just for fun",
    "Write a book",
    "Make some videos (only post them if you have permission)"
  ];

  let lastResults = [];

  function generate() {
    let index;

    do {
      index = Math.floor(Math.random() * ideas.length);
    } while (lastResults.includes(index) && ideas.length > 5);

    lastResults.push(index);

    if (lastResults.length > 5) {
      lastResults.shift();
    }

    document.getElementById("result").innerText = ideas[index];
  }
</script>

</body>
</html>
