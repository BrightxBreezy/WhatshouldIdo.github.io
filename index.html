<!DOCTYPE html>
<html>
<head>
  <title>What Should I Do?</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #ffe3ee, #d9f3ff, #ffffff);
      overflow: hidden;
    }

    /* soft background glow shapes */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
    }

    .g1 { background: #ff8fb3; top: -50px; left: -50px; }
    .g2 { background: #8fd3ff; bottom: -80px; right: -60px; }
    .g3 { background: #ffd38f; top: 40%; left: 70%; }

    .card {
      width: 92%;
      max-width: 560px;
      height: 85vh;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 35px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 32px;
      color: #222;
      margin-bottom: 40px;
      letter-spacing: 0.5px;
    }

    button {
      padding: 18px 34px;
      font-size: 18px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #ff5fa2, #ff9bc1);
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      transition: 0.25s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 12px 25px rgba(0,0,0,0.18);
    }

    #result {
      margin-top: 50px;
      font-size: 28px;
      font-weight: bold;
      color: #333;
      min-height: 90px;
      padding: 0 20px;
      line-height: 1.3;
    }
  </style>
</head>

<body>

<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>

<div class="card">

  <h1>What Should I Do Right Now?</h1>

  <button onclick="generate()">Click here to find out</button>

  <div id="result"></div>

</div>

<script>
  const ideas = [
    "Go outside for 5 minutes and just exist",
    "Drink a full glass of water right now",
    "Text someone you haven’t talked to in a while",
    "Do 15 jumping jacks like your life depends on it",
    "Draw the first thing that pops into your head",
    "Watch a completely random video on YouTube",
    "Clean the most annoying spot in your room",
    "Make up a brand new game with weird rules",
    "Stare out a window for 2 minutes",
    "Listen to a song you haven’t heard in months",
    "Try to balance something on your head",
    "Write a fake movie plot in 1 minute",
    "Google something you’ve always been curious about",
    "Organize one small thing like a drawer or folder",
    "Try to do a handstand",
    "Take 10 deep slow breaths",
    "Invent a useless invention",
    "Make a meme in your head",
    "Act like you’re a narrator describing your life",
    "Try to find 3 things that are blue around you",
    "Say something nice to someone in your house",
    "Walk around your room like it’s a runway",
    "Pretend you’re in a video game for 2 minutes",
    "Write a weird question and try to answer it",
    "Make a snack but make it chaotic",
    "Rearrange something just for fun",
    "Write a book",
    "Make some videos (only post them if you have permission)"
  ];

  let lastResults = [];

  function generate() {
    let index;

    do {
      index = Math.floor(Math.random() * ideas.length);
    } while (lastResults.includes(index) && ideas.length > 5);

    lastResults.push(index);

    if (lastResults.length > 5) {
      lastResults.shift();
    }

    document.getElementById("result").innerText = ideas[index];
  }
</script>

</body>
</html>
